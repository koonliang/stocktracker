services:
  mysql:
    image: mysql:8.4
    container_name: stocktracker-mysql
    environment:
      MYSQL_DATABASE: stocktracker
      MYSQL_USER: stocktracker
      MYSQL_PASSWORD: stocktracker
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '13306:3306'
    volumes:
      - stocktracker-mysql-data:/var/lib/mysql
    healthcheck:
      # -h 127.0.0.1 forces a TCP probe (not the unix socket). During MySQL's
      # first-run volume init a temporary server listens on the socket only
      # (--skip-networking), so a socket ping would report healthy before the
      # real server accepts TCP — the backend would then hit "connection
      # refused". Probing TCP makes `healthy` mean 3306 is actually ready.
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: stocktracker-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mysql://mysql:3306/stocktracker
      QUARKUS_DATASOURCE_USERNAME: stocktracker
      QUARKUS_DATASOURCE_PASSWORD: stocktracker
      STOCKTRACKER_DEV_BOOTSTRAP_ENABLED: 'true'
      # Market data + FX providers. The stub is deterministic and network-free, so
      # the local stack + e2e suite never call external services. To run against the
      # real providers, set STOCKTRACKER_MARKETDATA_PROVIDER=yahoo and
      # STOCKTRACKER_FX_PROVIDER=frankfurter (neither needs an API key).
      STOCKTRACKER_MARKETDATA_PROVIDER: 'yahoo'
      STOCKTRACKER_FX_PROVIDER: 'frankfurter'
      # The e2e auth journey drives the backend-owned dev flows + dev token endpoint.
      STOCKTRACKER_AUTH_MODE: 'dev'
      # The regression suite makes many /api/auth/* calls from one IP within the rate-limit
      # window (every protected journey signs in); lift the limit so it never trips 429.
      STOCKTRACKER_AUTH_RATE_LIMIT_MAX: '1000'
      NONPROD_GOOGLE_CLIENT_ID: ${NONPROD_GOOGLE_CLIENT_ID:-}
      NONPROD_GOOGLE_CLIENT_SECRET: ${NONPROD_GOOGLE_CLIENT_SECRET:-}
      NONPROD_FACEBOOK_CLIENT_ID: ${NONPROD_FACEBOOK_CLIENT_ID:-}
      NONPROD_FACEBOOK_CLIENT_SECRET: ${NONPROD_FACEBOOK_CLIENT_SECRET:-}
      NONPROD_SOCIAL_REDIRECT_URI: ${NONPROD_SOCIAL_REDIRECT_URI:-}
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/q/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: stocktracker-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
      VITE_AUTH_MODE: ${VITE_AUTH_MODE:-dev}
    ports:
      - '5173:5173'
    healthcheck:
      # Vite binds 0.0.0.0 (IPv4 only); in Alpine `localhost` resolves to ::1
      # (IPv6) first, so a localhost probe is refused and the container never
      # reports healthy. Probe 127.0.0.1 to match where Vite actually listens.
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:5173 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

volumes:
  stocktracker-mysql-data:
