quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:stocktracker}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:stocktracker}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:mysql://localhost:3306/stocktracker_dev}
quarkus.hibernate-orm.database.generation=validate
# migrate-at-start defaults on (local dev + migrator Lambda). The backend HTTP
# Lambda overrides it to false (QUARKUS_FLYWAY_MIGRATE_AT_START) so migrations
# only run via the dedicated migrator Lambda during CD.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
# The migrator seeds ~39k reference-data rows in one startup transaction; the
# default 60s Narayana timeout is too short. Scoped to the migrate profile so the
# backend's request transactions keep the safe default.
%migrate.quarkus.transaction-manager.default-transaction-timeout=300
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.host=0.0.0.0
quarkus.jackson.fail-on-unknown-properties=false
stocktracker.dev-bootstrap.enabled=${STOCKTRACKER_DEV_BOOTSTRAP_ENABLED:true}

# --- Authentication ---------------------------------------------------------
# Mode gates token issuance + dev-only endpoints. The resource layer validates
# JWTs identically in both modes (dev self-signed RS256 vs Cognito-issued).
stocktracker.auth.mode=${STOCKTRACKER_AUTH_MODE:dev}
# JWT validation. Dev verifies against the bundled public key; production
# overrides MP_JWT_VERIFY_* to point at the Cognito issuer + JWKS URL.
mp.jwt.verify.publickey.location=${MP_JWT_VERIFY_PUBLICKEY_LOCATION:jwt/publicKey.pem}
mp.jwt.verify.issuer=${MP_JWT_VERIFY_ISSUER:stocktracker-dev}
# Dev token issuance (smallrye-jwt-build); unused in cognito mode.
smallrye.jwt.sign.key.location=jwt/privateKey.pem
smallrye.jwt.new-token.issuer=stocktracker-dev
stocktracker.auth.access-token.ttl-seconds=${STOCKTRACKER_AUTH_TOKEN_TTL:3600}
stocktracker.auth.verification-token.ttl-seconds=86400
stocktracker.auth.reset-token.ttl-seconds=3600
# Per-identity + per-IP sliding-window rate limit for /api/auth/*.
stocktracker.auth.rate-limit.max-attempts=${STOCKTRACKER_AUTH_RATE_LIMIT_MAX:10}
stocktracker.auth.rate-limit.window-seconds=${STOCKTRACKER_AUTH_RATE_LIMIT_WINDOW:60}
# Dev mailer logs the verification/reset email instead of sending it.
quarkus.mailer.mock=true
quarkus.mailer.from=no-reply@stocktracker.local

# --- TEMPORARY cold-start diagnostics (remove once Lambda HTTP boot is fixed) ---
# "No virtual channel available" means the Quarkus app failed to start. These
# raise verbosity on the boot path (lambda handler, bootstrap, vertx-http,
# datasource, flyway) so the real startup exception is captured in CloudWatch.
quarkus.log.min-level=TRACE
quarkus.log.category."io.quarkus.amazon.lambda".level=DEBUG
quarkus.log.category."io.quarkus.bootstrap".level=DEBUG
quarkus.log.category."io.quarkus.runtime".level=DEBUG
quarkus.log.category."io.quarkus.vertx.http".level=DEBUG
quarkus.log.category."io.agroal".level=DEBUG
quarkus.log.category."org.flywaydb".level=DEBUG
