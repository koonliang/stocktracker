name: drift-check

on:
  workflow_dispatch:

concurrency:
  group: drift-check-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  drift:
    name: terraform-refresh-only
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        stack:
          - name: persistent
            path: infra/envs/production-persistent
          - name: ephemeral
            path: infra/envs/production
    defaults:
      run:
        working-directory: ${{ matrix.stack.path }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan (refresh-only)
        id: plan
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_provisioned_concurrency: ${{ vars.PROVISIONED_CONCURRENCY || 0 }}
        run: |
          set +e
          terraform plan -input=false -no-color -lock-timeout=5m \
            -refresh-only -detailed-exitcode | tee plan.txt
          ec=${PIPESTATUS[0]}
          echo "exitcode=$ec" >> "$GITHUB_OUTPUT"
          # 0 = no changes, 1 = error, 2 = drift detected
          if [ "$ec" -eq 1 ]; then
            exit 1
          fi
          exit 0

      - name: Open or update drift issue
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        env:
          STACK_NAME: ${{ matrix.stack.name }}
          STACK_PATH: ${{ matrix.stack.path }}
        with:
          script: |
            const fs = require('fs');
            const stackName = process.env.STACK_NAME;
            const stackPath = process.env.STACK_PATH;
            const path = `${stackPath}/plan.txt`;
            let plan = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '(plan output missing)';
            const max = 50000;
            if (plan.length > max) {
              plan = plan.slice(0, max) + '\n\n...[truncated]';
            }
            const marker = `<!-- drift-check:${stackName} -->`;
            const title = `Infrastructure drift detected in production (${stackName} stack)`;
            const body = `${marker}\nA \`terraform plan -refresh-only\` against \`${stackPath}\` detected drift between declared and actual state.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n<details><summary>Refresh-only plan output</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'drift', per_page: 100,
            });
            const existing = issues.find(i => i.body && i.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: ['drift'] });
            }
