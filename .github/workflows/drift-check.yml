name: drift-check

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: drift-check-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  drift:
    name: terraform-refresh-only
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    defaults:
      run:
        working-directory: infra/envs/production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan (refresh-only)
        id: plan
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN || 'plan-only-placeholder-not-valid-for-api-calls' }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
          TF_VAR_acm_certificate_arn: ${{ vars.ACM_CERTIFICATE_ARN }}
          TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
          TF_VAR_provisioned_concurrency: ${{ vars.PROVISIONED_CONCURRENCY || 0 }}
        run: |
          set +e
          terraform plan -input=false -no-color -lock-timeout=5m \
            -refresh-only -detailed-exitcode | tee plan.txt
          ec=${PIPESTATUS[0]}
          echo "exitcode=$ec" >> "$GITHUB_OUTPUT"
          # 0 = no changes, 1 = error, 2 = drift detected
          if [ "$ec" -eq 1 ]; then
            exit 1
          fi
          exit 0

      - name: Open or update drift issue
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'infra/envs/production/plan.txt';
            let plan = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '(plan output missing)';
            const max = 50000;
            if (plan.length > max) {
              plan = plan.slice(0, max) + '\n\n...[truncated]';
            }
            const marker = '<!-- drift-check -->';
            const title = 'Infrastructure drift detected in production';
            const body = `${marker}\nA scheduled \`terraform plan -refresh-only\` against \`infra/envs/production\` detected drift between declared and actual state.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n<details><summary>Refresh-only plan output</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'drift', per_page: 100,
            });
            const existing = issues.find(i => i.body && i.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: ['drift'] });
            }
