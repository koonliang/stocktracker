name: CD

on:
  # Manual-only: deploys (incl. terraform apply of the ephemeral stack) are
  # triggered deliberately, not on every merge to main, to control cost.
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (blank = current main)'
        required: false
        type: string
        default: ''

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Single source of truth for "which commit are we deploying":
  #   - push:main          → github.sha (the merge commit on main)
  #   - workflow_dispatch  → inputs.commit_sha if supplied, else github.sha
  # Used for artifact naming, checkouts, and the deployment summary so
  # rollback can find the artifact by SHA.
  DEPLOY_SHA: ${{ inputs.commit_sha || github.sha }}

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    outputs:
      artifact_name: app-${{ env.DEPLOY_SHA }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Package backend Lambda
        run: bash scripts/package-lambda.sh

      # The frontend bundle is built in frontend-deploy (after terraform-apply),
      # so it can bake in VITE_API_BASE_URL from the API Gateway invoke URL.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ env.DEPLOY_SHA }}
          path: |
            backend/target/function.zip
          retention-days: 30
          if-no-files-found: error

  terraform-apply:
    name: terraform-apply
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      lambda_function_name: ${{ steps.outputs.outputs.lambda_function_name }}
      migrator_function_name: ${{ steps.outputs.outputs.migrator_function_name }}
      api_invoke_url: ${{ steps.outputs.outputs.api_invoke_url }}
      cloudfront_domain_name: ${{ steps.outputs.outputs.cloudfront_domain_name }}
      cloudfront_distribution_id: ${{ steps.outputs.outputs.cloudfront_distribution_id }}
      frontend_bucket_name: ${{ steps.outputs.outputs.frontend_bucket_name }}
      public_frontend_url: ${{ steps.outputs.outputs.public_frontend_url }}
      cognito_hosted_ui_domain: ${{ steps.outputs.outputs.cognito_hosted_ui_domain }}
      cognito_user_pool_client_id: ${{ steps.outputs.outputs.cognito_user_pool_client_id }}
    defaults:
      run:
        working-directory: infra/envs/production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_provisioned_concurrency: ${{ vars.PROVISIONED_CONCURRENCY || 0 }}
        run: terraform apply -input=false -auto-approve -lock-timeout=10m

      - name: Capture outputs
        id: outputs
        run: |
          set -euo pipefail
          for k in lambda_function_name api_invoke_url cloudfront_domain_name cloudfront_distribution_id frontend_bucket_name migrator_function_name cognito_hosted_ui_domain cognito_user_pool_client_id; do
            v=$(terraform output -raw "$k" 2>/dev/null || true)
            echo "$k=$v" >> "$GITHUB_OUTPUT"
          done
          domain=$(terraform output -raw cloudfront_domain_name 2>/dev/null || true)
          echo "public_frontend_url=https://${domain}" >> "$GITHUB_OUTPUT"

  db-migrate:
    name: db-migrate
    needs: [build, terraform-apply]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-${{ env.DEPLOY_SHA }}
          # Single-file artifact unpacks to function.zip at the root; restore the
          # backend/target/ prefix the deploy commands expect.
          path: backend/target

      - name: Upload migrator code
        env:
          FUNCTION_NAME: ${{ needs.terraform-apply.outputs.migrator_function_name }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://backend/target/function.zip >/dev/null
          aws lambda wait function-updated --function-name "$FUNCTION_NAME"

      - name: Run Flyway migration
        env:
          FUNCTION_NAME: ${{ needs.terraform-apply.outputs.migrator_function_name }}
        run: |
          set -euo pipefail
          # The migrator runs the same Quarkus app under the 'migrate' profile,
          # which applies Flyway migrations during startup (cold-start INIT).
          # If a migration fails, Quarkus startup throws, the Lambda INIT fails,
          # and the invoke reports a FunctionError. A clean invoke (no
          # FunctionError) therefore means migrations applied successfully; the
          # HTTP response body itself is irrelevant to migration status.
          response=$(aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --invocation-type RequestResponse \
            --payload '{}' \
            --cli-binary-format raw-in-base64-out \
            --cli-read-timeout 360 \
            /tmp/migrate-response.json)
          echo "Lambda response metadata: $response"
          echo "Lambda response body:"
          cat /tmp/migrate-response.json
          echo ""

          error=$(echo "$response" | jq -r '.FunctionError // empty')
          if [ -n "$error" ]; then
            echo "::error::Migrator Lambda init failed (migration error): $error"
            exit 1
          fi
          echo "Migrations applied (migrator booted without init error)."

  backend-deploy:
    name: backend-deploy
    needs: [terraform-apply, db-migrate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      function_version: ${{ steps.publish.outputs.version }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-${{ env.DEPLOY_SHA }}
          # Single-file artifact unpacks to function.zip at the root; restore the
          # backend/target/ prefix the deploy commands expect.
          path: backend/target

      - name: Update function code
        env:
          FUNCTION_NAME: ${{ needs.terraform-apply.outputs.lambda_function_name }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://backend/target/function.zip >/dev/null
          aws lambda wait function-updated --function-name "$FUNCTION_NAME"

      - name: Publish version
        id: publish
        env:
          FUNCTION_NAME: ${{ needs.terraform-apply.outputs.lambda_function_name }}
        run: |
          version=$(aws lambda publish-version \
            --function-name "$FUNCTION_NAME" \
            --description "ci-${{ env.DEPLOY_SHA }}" \
            --query Version --output text)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Update production alias
        env:
          FUNCTION_NAME: ${{ needs.terraform-apply.outputs.lambda_function_name }}
          VERSION: ${{ steps.publish.outputs.version }}
        run: |
          aws lambda update-alias \
            --function-name "$FUNCTION_NAME" \
            --name production \
            --function-version "$VERSION" >/dev/null

  frontend-deploy:
    name: frontend-deploy
    needs: terraform-apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Build with the live API Gateway URL baked in. Backend resources are
      # served under /api/* (e.g. @Path("/api/dashboard")) and the frontend
      # client appends resource paths to VITE_API_BASE_URL, so it must end /api.
      # Production delegates identity to Cognito, so the SPA must build in cognito
      # mode with the pool's Hosted-UI domain + app client id baked in. Without
      # these the bundle silently falls back to dev mode (backend /api/auth/*),
      # so sign-ups never reach Cognito and the social buttons stay hidden.
      - name: Build frontend bundle
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ needs.terraform-apply.outputs.api_invoke_url }}/api
          VITE_AUTH_MODE: cognito
          VITE_COGNITO_DOMAIN: ${{ needs.terraform-apply.outputs.cognito_hosted_ui_domain }}
          VITE_COGNITO_CLIENT_ID: ${{ needs.terraform-apply.outputs.cognito_user_pool_client_id }}
        run: |
          npm ci
          npm run build

      - name: Sync frontend bundle to S3
        env:
          BUCKET: ${{ needs.terraform-apply.outputs.frontend_bucket_name }}
        run: |
          # Content-hashed assets are immutable — cache them for a year.
          aws s3 sync frontend/dist/ "s3://${BUCKET}/" --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"
          # index.html is the entry point — never let a stale copy pin old
          # asset hashes; always revalidate.
          aws s3 cp frontend/dist/index.html "s3://${BUCKET}/index.html" \
            --cache-control "no-cache, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        env:
          DIST_ID: ${{ needs.terraform-apply.outputs.cloudfront_distribution_id }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/" "/index.html" >/dev/null

  smoke:
    name: smoke
    needs: [terraform-apply, backend-deploy, frontend-deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - name: Run smoke checks
        env:
          PUBLIC_URL: ${{ needs.terraform-apply.outputs.public_frontend_url }}
          API_URL: ${{ needs.terraform-apply.outputs.api_invoke_url }}
        run: bash scripts/smoke-check.sh "$PUBLIC_URL" "$API_URL"

  summary:
    name: summary
    needs: [build, terraform-apply, db-migrate, backend-deploy, frontend-deploy, smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write deployment summary
        env:
          STATUS_BUILD: ${{ needs.build.result }}
          STATUS_APPLY: ${{ needs.terraform-apply.result }}
          STATUS_MIGRATE: ${{ needs.db-migrate.result }}
          STATUS_BACKEND: ${{ needs.backend-deploy.result }}
          STATUS_FRONTEND: ${{ needs.frontend-deploy.result }}
          STATUS_SMOKE: ${{ needs.smoke.result }}
          DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
          BACKEND_VERSION: ${{ needs.backend-deploy.outputs.function_version }}
          API_URL: ${{ needs.terraform-apply.outputs.api_invoke_url }}
          PUBLIC_URL: ${{ needs.terraform-apply.outputs.public_frontend_url }}
          BUCKET: ${{ needs.terraform-apply.outputs.frontend_bucket_name }}
          FUNCTION_NAME: ${{ needs.terraform-apply.outputs.lambda_function_name }}
          DIST_ID: ${{ needs.terraform-apply.outputs.cloudfront_distribution_id }}
        run: |
          {
            echo "### Deployment summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| commit_sha | \`${DEPLOY_SHA}\` |"
            echo "| trigger | ${GITHUB_EVENT_NAME} |"
            echo "| run_id | [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
            echo "| environment | production |"
            echo "| backend_artifact_version | \`${BACKEND_VERSION:-n/a}\` |"
            echo "| lambda_function_name | \`${FUNCTION_NAME:-n/a}\` |"
            echo "| api_invoke_url | ${API_URL:-n/a} |"
            echo "| frontend_bucket_name | \`${BUCKET:-n/a}\` |"
            echo "| cloudfront_distribution_id | \`${DIST_ID:-n/a}\` |"
            echo "| public_frontend_url | ${PUBLIC_URL:-n/a} |"
            echo "| build | ${STATUS_BUILD} |"
            echo "| terraform-apply | ${STATUS_APPLY} |"
            echo "| db-migrate | ${STATUS_MIGRATE} |"
            echo "| backend-deploy | ${STATUS_BACKEND} |"
            echo "| frontend-deploy | ${STATUS_FRONTEND} |"
            echo "| smoke | ${STATUS_SMOKE} |"
          } >> "$GITHUB_STEP_SUMMARY"
