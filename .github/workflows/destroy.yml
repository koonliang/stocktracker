name: destroy-production

# Tears down the EPHEMERAL stack only (VPC, RDS, Lambda, API Gateway).
# The persistent stack (CloudFront + frontend S3 bucket) is intentionally
# NOT touched here — see destroy-persistent.yml for full wipe.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy-production" to confirm'
        required: true
        type: string

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  destroy:
    name: terraform-destroy
    if: ${{ inputs.confirm == 'destroy-production' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/envs/production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform destroy
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_provisioned_concurrency: ${{ vars.PROVISIONED_CONCURRENCY || 0 }}
          TF_VAR_rds_master_password: ${{ secrets.RDS_MASTER_PASSWORD }}
        run: terraform destroy -input=false -auto-approve -lock-timeout=10m
