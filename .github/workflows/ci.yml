name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/**'
              - '.github/workflows/ci.yml'

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    outputs:
      branch_coverage: ${{ steps.coverage.outputs.branch_coverage }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test
        run: ./mvnw -B verify
      - name: Capture branch coverage
        id: coverage
        if: always()
        run: |
          csv=target/site/jacoco/jacoco.csv
          branch_coverage=0.00
          if [ -f "$csv" ]; then
            branch_coverage=$(awk -F, 'NR>1 { missed += $6; covered += $7 } END { if (missed + covered > 0) printf "%.2f", (covered / (missed + covered)) * 100; else printf "0.00" }' "$csv")
          fi
          echo "branch_coverage=$branch_coverage" >> "$GITHUB_OUTPUT"

  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test with coverage threshold
        run: npm run test:coverage
      - name: Build
        run: npm run build

  terraform-plan:
    name: terraform-plan (${{ matrix.stack.name }})
    needs: changes
    if: needs.changes.outputs.infra == 'true' && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        stack:
          - name: persistent
            path: infra/envs/production-persistent
          - name: ephemeral
            path: infra/envs/production
    defaults:
      run:
        working-directory: ${{ matrix.stack.path }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: infra

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: tflint
        env:
          # tflint --init pulls the aws ruleset from GitHub releases; the
          # token raises the rate limit from 60/h (unauthenticated, shared
          # with every other Actions runner on the same egress IP) to
          # 5000/h for the workflow.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tflint --init --chdir="${GITHUB_WORKSPACE}/infra"
          tflint --chdir="${GITHUB_WORKSPACE}/${{ matrix.stack.path }}" --format=compact

      - name: Terraform plan
        id: plan
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_provisioned_concurrency: ${{ vars.PROVISIONED_CONCURRENCY || 0 }}
        run: |
          set -o pipefail
          terraform plan -input=false -no-color -lock-timeout=5m | tee plan.txt

      - name: Post plan summary to PR
        # Only PR runs have an issue/PR to comment on; on push to main
        # context.issue.number is undefined and the API call 404s.
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          STACK_NAME: ${{ matrix.stack.name }}
          STACK_PATH: ${{ matrix.stack.path }}
        with:
          script: |
            const fs = require('fs');
            const stackName = process.env.STACK_NAME;
            const stackPath = process.env.STACK_PATH;
            const path = `${stackPath}/plan.txt`;
            const marker = `<!-- tf-plan:${stackName} -->`;
            let body;
            if (fs.existsSync(path)) {
              let plan = fs.readFileSync(path, 'utf8');
              const max = 60000;
              if (plan.length > max) {
                plan = plan.slice(0, max) + '\n\n...[truncated]';
              }
              body = `${marker}\n### Terraform plan (\`${stackPath}\`)\n\n<details><summary>Show plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            } else {
              body = `${marker}\n### Terraform plan (\`${stackPath}\`)\n\nPlan did not produce output. See workflow logs.`;
            }
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  gates:
    name: gates
    if: always()
    needs: [backend-test, frontend-test, terraform-plan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the secret scan covers every commit, not just HEAD.
          fetch-depth: 0
      - name: Scan git history for secrets
        run: bash scripts/scan-secrets.sh
      - name: Aggregate required checks
        run: |
          backend='${{ needs.backend-test.result }}'
          branch_coverage='${{ needs.backend-test.outputs.branch_coverage }}'
          frontend='${{ needs.frontend-test.result }}'
          tfplan='${{ needs.terraform-plan.result }}'
          echo "backend-test=$backend"
          echo "backend-test-branch-coverage=$branch_coverage"
          echo "frontend-test=$frontend"
          echo "terraform-plan=$tfplan"
          fail=0
          [ "$backend" = "success" ] || { echo "backend-test did not succeed"; fail=1; }
          awk -v coverage="$branch_coverage" 'BEGIN { exit !(coverage + 0 >= 50.0) }' \
            || { echo "backend-test branch coverage must be at least 50%"; fail=1; }
          [ "$frontend" = "success" ] || { echo "frontend-test did not succeed"; fail=1; }
          case "$tfplan" in
            success|skipped) ;;
            *) echo "terraform-plan did not succeed or skip"; fail=1 ;;
          esac
          exit $fail
