name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/**'
              - '.github/workflows/ci.yml'

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test
        run: ./mvnw -B verify

  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  terraform-plan:
    name: terraform-plan
    needs: changes
    if: needs.changes.outputs.infra == 'true' && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: infra/envs/production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: infra

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: tflint
        run: |
          tflint --init --chdir="${GITHUB_WORKSPACE}/infra"
          tflint --chdir="${GITHUB_WORKSPACE}/infra/envs/production" --format=compact

      - name: Terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -input=false -no-color -lock-timeout=5m | tee plan.txt

      - name: Post plan summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'infra/envs/production/plan.txt';
            let body;
            if (fs.existsSync(path)) {
              let plan = fs.readFileSync(path, 'utf8');
              const max = 60000;
              if (plan.length > max) {
                plan = plan.slice(0, max) + '\n\n...[truncated]';
              }
              body = `<!-- tf-plan -->\n### Terraform plan (\`infra/envs/production\`)\n\n<details><summary>Show plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            } else {
              body = `<!-- tf-plan -->\n### Terraform plan (\`infra/envs/production\`)\n\nPlan did not produce output. See workflow logs.`;
            }
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.startsWith('<!-- tf-plan -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  gates:
    name: gates
    if: always()
    needs: [backend-test, frontend-test, terraform-plan]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate required checks
        run: |
          backend='${{ needs.backend-test.result }}'
          frontend='${{ needs.frontend-test.result }}'
          tfplan='${{ needs.terraform-plan.result }}'
          echo "backend-test=$backend"
          echo "frontend-test=$frontend"
          echo "terraform-plan=$tfplan"
          fail=0
          [ "$backend" = "success" ] || { echo "backend-test did not succeed"; fail=1; }
          [ "$frontend" = "success" ] || { echo "frontend-test did not succeed"; fail=1; }
          case "$tfplan" in
            success|skipped) ;;
            *) echo "terraform-plan did not succeed or skip"; fail=1 ;;
          esac
          exit $fail
